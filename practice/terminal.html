	<body>
		<h1>Terminal commands</h1>
		<h2>Commands for first reading quiz</h2>
		<ul>
			<li><strong>ls</strong>
				<ul>
				<li>Lists the contents of the directory. If no directory is specified, lists the contents of the current working directory.</li>
				<li>How to use: <strong>ls $DIR</strong>. $DIR is the directory. Use the -l flag to get more information like <strong>ls $DIR -l</strong>.</li>
				</ul>
			</li>
			<li><strong>cd</strong>
				<ul>
				<li>Changes the current working directory to the directory you choose. In effect, moves you around the computer.</li>
				<li>How to use: <strong>cd $DIR</strong>. $DIR is the directory you want to change to. Use the .. argument to go back like <strong>cd ..</strong>.</li>
				</ul>
			</li>
			<li><strong>pwd</strong>
				<ul>
				<li>This command shows were you are in the computer all the way up to the top</li>
				<li>How to use:<strong>pwd</strong>.</li>
				</ul>
			</li>
		<h2>Commands for the second reading quiz</h2>
			<p>Credit to <cite> https://www.davidbaumgold.com/tutorials/command-lineM/</cite></p>
	</body>
